<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='favicon_io/apple-touch-icon.png') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon_io/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon_io/favicon-16x16.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='favicon_io/site.webmanifest') }}">
    <title>Emoji Party ⚡</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="floating-emoji" style="top: 10%; left: 10%; animation-delay: 0s;">😂</div>
    <div class="floating-emoji" style="top: 20%; right: 15%; animation-delay: 2s;">🔥</div>
    <div class="floating-emoji" style="bottom: 15%; left: 20%; animation-delay: 4s;">✨</div>
    <div class="floating-emoji" style="bottom: 10%; right: 5%; animation-delay: 1s;">🤣</div>
    <div class="floating-emoji" style="top: 50%; left: 5%; animation-delay: 3s;">🚀</div>

    <div class="joke-card">
        <span class="main-emoji">😆</span>
        
        <p class="setup" style="color: #cbd5e1; font-weight: 500;">
            {{ data.setup }}
        </p>
        
        <div class="punchline">
            {{ data.punchline }}
        </div>

        <a href="/" class="btn-funny">
            Next Joke 🤪
        </a>
    </div>

    <div class="brand">Sachin T • JOKE APP Edition</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
